<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickSite Builder-Build your own website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1 id="title">QuickSite Builder</h1>
        <h5 id="desc">Build your own Website Hassle Free</h5>
    </div>
    <div class="main">
        <p class="title">Enter your details here</p>
        <form id="businessForm">
            <p class="val">Business Name</p>
            <input type="text" id="businessName" placeholder="Enter the name of your business">
            <p class="val">Business Type</p>
            <input type="text" id="businessType" itemid="Enter the type of your business">
            <p class="val">Products/Services</p>
            <textarea id="products" placeholder="Enter the products or services that you deal with"></textarea>
            <p class="val">Phone</p>
            <input type="tel" id="phone" placeholder="Enter your telephone number">
            <p class="val">Email</p>
            <input type="email" id="email" placeholder="Enter your email">
            <p class="val">Address</p>
            <textarea id="address" placeholder="Enter your address"></textarea>
            <button id="generateWebsite" type="button">Generate Website

            </button>
        </form>
    </div>
    <div class="footer">

    </div>
    <script src="script.js"></script>
</body>
</html>
